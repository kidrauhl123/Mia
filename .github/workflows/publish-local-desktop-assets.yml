name: publish-local-desktop-assets

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  publish:
    runs-on: self-hosted
    steps:
      - name: Verify local desktop assets
        shell: bash
        run: |
          cd /Users/zuiyou/github/mia
          for file in \
            release/Mia-0.1.48-Apple-Silicon.dmg \
            release/Mia-0.1.48-Intel.dmg \
            release/Mia-0.1.48-arm64-mac.zip \
            release/Mia-0.1.48-arm64-mac.zip.blockmap \
            release/Mia-0.1.48-mac.zip \
            release/Mia-0.1.48-mac.zip.blockmap \
            dist/mia-updates/latest-mac.yml \
            dist/mia-updates/SHA256SUMS; do
            test -s "$file"
          done

      - name: Upload desktop assets for release relay
        uses: actions/upload-artifact@v4
        with:
          name: Mia-desktop-assets-v0.1.48
          path: |
            /Users/zuiyou/github/mia/release/Mia-0.1.48-Apple-Silicon.dmg
            /Users/zuiyou/github/mia/release/Mia-0.1.48-Intel.dmg
            /Users/zuiyou/github/mia/release/Mia-0.1.48-arm64-mac.zip
            /Users/zuiyou/github/mia/release/Mia-0.1.48-arm64-mac.zip.blockmap
            /Users/zuiyou/github/mia/release/Mia-0.1.48-mac.zip
            /Users/zuiyou/github/mia/release/Mia-0.1.48-mac.zip.blockmap
            /Users/zuiyou/github/mia/dist/mia-updates/latest-mac.yml
            /Users/zuiyou/github/mia/dist/mia-updates/SHA256SUMS
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
